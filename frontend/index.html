<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right Customer, Right Loan, Right Time - IDBI Bank</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts (Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- React and ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone CDN -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Plotly.js CDN -->
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

  <!-- Tailwind Theme Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#556B2F',
            'primary-dark': '#3F5220',
            accent: '#A9A067',
            bgLight: '#F5F5EE',
            surface: '#FFFFFF',
            surfaceBorder: '#D9D9C2',
            success: '#6B8E23',
            warning: '#C08A2E',
            danger: '#8B4A3B',
            textPrimary: '#2E2E1F',
            textSecondary: '#6B6B54',
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style type="text/css">
    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #D9D9C2;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #A9A067;
    }

    /* Soft transition animations */
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#F5F5EE] text-[#2E2E1F] font-sans antialiased">

  <!-- React Mount Point -->
  <div id="root"></div>

  <!-- React Code with Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- SVG Icon Components for Self-Containment ---
    const LayoutDashboardIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="7" height="9" x="3" y="3" rx="1" />
        <rect width="7" height="5" x="14" y="3" rx="1" />
        <rect width="7" height="9" x="14" y="12" rx="1" />
        <rect width="7" height="5" x="3" y="14" rx="1" />
      </svg>
    );

    const UsersIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
      </svg>
    );

    const MessageSquareIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    );

    const CpuIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="16" height="16" x="4" y="4" rx="2" />
        <rect width="6" height="6" x="9" y="9" rx="1" />
        <path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3" />
      </svg>
    );

    const SearchIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.3-4.3" />
      </svg>
    );

    const ShieldCheckIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z" />
        <path d="m9 12 2 2 4-4" />
      </svg>
    );

    const ArrowRightIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7" />
      </svg>
    );

    const SparklesIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z" />
        <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5Z" />
        <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1Z" />
      </svg>
    );

    const RefreshCwIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
        <path d="M16 3h5v5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
        <path d="M8 21H3v-5" />
      </svg>
    );

    const AlertTriangleIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    );

    const LogOutIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
      </svg>
    );

    const AlertCircleIcon = ({ className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
    );

    // --- Plotly Chart React Wrapper Component ---
    const PlotlyChart = ({ id, data, layout, config }) => {
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current && window.Plotly) {
          window.Plotly.react(chartRef.current, data, {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: {
              family: '"Outfit", sans-serif',
              color: '#2E2E1F'
            },
            margin: { t: 30, r: 15, l: 120, b: 30 },
            ...layout
          }, {
            responsive: true,
            displayModeBar: false,
            ...config
          });
        }
      }, [data, layout, config]);

      return <div ref={chartRef} id={id} className="w-full h-full min-h-[180px]" />;
    };

    // --- Simple Progress Bar Component ---
    const ProgressBar = ({ label, score, colorClass = "bg-primary" }) => (
      <div className="flex flex-col gap-1 w-full">
        <div className="flex justify-between text-xs font-semibold text-textPrimary">
          <span>{label}</span>
          <span>{score.toFixed(0)}/100</span>
        </div>
        <div className="w-full bg-surfaceBorder/30 h-2.5 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all duration-500 ${colorClass}`} style={{ width: `${score}%` }}></div>
        </div>
      </div>
    );

    // --- Main Application Component ---
    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [loginEmail, setLoginEmail] = useState('admin@idbibank.co.in');
      const [loginPassword, setLoginPassword] = useState('password');
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [leads, setLeads] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      
      const [weights, setWeights] = useState({ intent: 0.35, repayment: 0.35, income: 0.30 });
      const [apiStatus, setApiStatus] = useState({ models: [], gemini: 'missing' });

      const [searchQuery, setSearchQuery] = useState('');
      const [productFilter, setProductFilter] = useState('');
      const [priorityFilter, setPriorityFilter] = useState('');
      const [sortField, setSortField] = useState('lead_score');

      const [selectedLeadId, setSelectedLeadId] = useState(null);

      const [chatCustomerId, setChatCustomerId] = useState('');
      const [chatMessages, setChatMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [chatLoading, setChatLoading] = useState(false);
      
      const [trainingMetrics, setTrainingMetrics] = useState(null);
      const [trainingLoading, setTrainingLoading] = useState(false);

      const chatEndRef = useRef(null);

      const fetchData = () => {
        setLoading(true);
        fetch('/api/status')
          .then(res => res.json())
          .then(statusData => {
            setApiStatus({
              models: statusData.loaded_models,
              gemini: statusData.gemini_api
            });
            setWeights(statusData.weights_config);
          })
          .catch(err => console.error("Failed to load status:", err));

        fetch('/api/leads')
          .then(res => {
            if (!res.ok) throw new Error("Failed to load customer profiles.");
            return res.json();
          })
          .then(data => {
            setLeads(data);
            if (data.length > 0) {
              setChatCustomerId(data[0].customer_id);
              setChatMessages([
                { sender: 'bot', text: `Welcome Sanjay Mehta. I am grounded in the IDBI Innovate 2026 scoring database. Select a customer to begin auditing their intent and transaction stability.`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
              ]);
            }
            setLoading(false);
          })
          .catch(err => {
            console.error(err);
            setError(err.message);
            setLoading(false);
          });
      };

      useEffect(() => {
        fetchData();
      }, []);

      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages, chatLoading]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginEmail && loginPassword) {
          setIsLoggedIn(true);
        }
      };

      const stats = useMemo(() => {
        if (leads.length === 0) return { total: 0, highIntent: 0, avgRepayment: 0, hotLeads: 0 };
        const total = leads.length;
        const highIntent = leads.filter(l => l.intent_score >= 70).length;
        const avgRepayment = leads.reduce((acc, l) => acc + l.repayment_score, 0) / total;
        const hotLeads = leads.filter(l => l.lead_score >= 70).length;
        
        return {
          total,
          highIntent,
          avgRepayment: Math.round(avgRepayment),
          hotLeads
        };
      }, [leads]);

      const selectedLead = useMemo(() => {
        return leads.find(l => l.customer_id === selectedLeadId) || null;
      }, [leads, selectedLeadId]);

      const filteredLeads = useMemo(() => {
        return leads
          .filter(l => {
            const matchQuery = l.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                               l.occupation_type.toLowerCase().includes(searchQuery.toLowerCase()) ||
                               l.customer_id.toLowerCase().includes(searchQuery.toLowerCase());
            
            const matchProduct = productFilter === '' || l.recommended_product === productFilter;
            
            let priority = 'Cold';
            if (l.lead_score >= 70) priority = 'Hot';
            else if (l.lead_score >= 40) priority = 'Warm';
            
            const matchPriority = priorityFilter === '' || priority === priorityFilter;
            
            return matchQuery && matchProduct && matchPriority;
          })
          .sort((a, b) => b[sortField] - a[sortField]);
      }, [leads, searchQuery, productFilter, priorityFilter, sortField]);

      const triggerRetraining = () => {
        setTrainingLoading(true);
        fetch('/api/train', { method: 'POST' })
          .then(res => {
            if (!res.ok) throw new Error("Retraining failed on backend.");
            return res.json();
          })
          .then(data => {
            setTrainingMetrics(data.metrics);
            setTrainingLoading(false);
            fetchData();
          })
          .catch(err => {
            console.error(err);
            alert(err.message);
            setTrainingLoading(false);
          });
      };

      const handleSendChatMessage = (presetText = null) => {
        const userText = presetText || chatInput;
        if (!userText.trim() || chatLoading) return;
        
        const msgTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        setChatMessages(prev => [...prev, { sender: 'user', text: userText, time: msgTime }]);
        if (!presetText) setChatInput('');
        setChatLoading(true);

        fetch('/api/chatbot/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_id: chatCustomerId,
            question: userText
          })
        })
          .then(res => {
            if (!res.ok) throw new Error("AI query failed.");
            return res.json();
          })
          .then(data => {
            setChatMessages(prev => [...prev, {
              sender: 'bot',
              text: data.answer,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            }]);
            setChatLoading(false);
          })
          .catch(err => {
            console.error(err);
            setChatMessages(prev => [...prev, {
              sender: 'bot',
              text: `[SYSTEM ERROR] Could not query Gemini AI models. Fallback statistics for ${chatCustomerId}: Income stability score is ${leads.find(l => l.customer_id === chatCustomerId)?.income_score.toFixed(0)}/100 and recommended product is ${leads.find(l => l.customer_id === chatCustomerId)?.recommended_product}.`,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            }]);
            setChatLoading(false);
          });
      };

      const financialChartData = useMemo(() => {
        if (!selectedLead) return [];
        const income = selectedLead.monthly_credits;
        const expense = selectedLead.monthly_debits;
        const emi = selectedLead.existing_emis;
        const disposable = Math.max(0, income - expense - emi);

        return [{
          x: ['Credits (Income)', 'Debits (Expenses)', 'Existing EMIs', 'Disposable'],
          y: [income, expense, emi, disposable],
          type: 'bar',
          marker: {
            color: ['#556B2F', '#C08A2E', '#8B4A3B', '#6B8E23'],
            line: { color: '#D9D9C2', width: 1 }
          }
        }];
      }, [selectedLead]);

      const financialChartLayout = {
        title: { text: 'Monthly Flow Allocation (INR)', font: { size: 11, weight: 'bold' } },
        xaxis: { gridcolor: '#F5F5EE' },
        yaxis: { title: 'INR (₹)', gridcolor: '#D9D9C2' },
        margin: { t: 30, r: 10, l: 50, b: 35 }
      };

      const shapChartData = useMemo(() => {
        if (!selectedLead) return [];
        const contrib = selectedLead.feature_contributions.repayment; 
        const sorted = Object.entries(contrib).sort((a, b) => Math.abs(a[1]) - Math.abs(b[1]));

        const friendlyNames = {
          'age': 'Age',
          'monthly_credits': 'Monthly Credits',
          'monthly_debits': 'Monthly Debits',
          'salary_credit_flag': 'Regular Salary',
          'num_income_sources': 'Income Sources',
          'existing_emis': 'Existing EMIs',
          'avg_balance': 'Average Balance',
          'txn_frequency': 'Transaction Freq',
          'loan_app_visits': 'App Visits',
          'emi_calculator_uses': 'EMI Calc Uses',
          'credit_score': 'Bureau Score',
          'existing_loans': 'Active Loans',
          'occupation_type_code': 'Occupation type',
          'preferred_loan_type_code': 'Stated Interest'
        };

        return [{
          type: 'bar',
          x: sorted.map(([, v]) => v),
          y: sorted.map(([k]) => friendlyNames[k] || k),
          orientation: 'h',
          marker: {
            color: sorted.map(([, v]) => v >= 0 ? '#6B8E23' : '#8B4A3B'),
            line: { color: '#D9D9C2', width: 1 }
          }
        }];
      }, [selectedLead]);

      const shapChartLayout = {
        title: { text: 'Repayment drivers (SHAP impact weights)', font: { size: 11, weight: 'bold' } },
        margin: { l: 110, r: 10, t: 30, b: 30 },
        xaxis: { title: 'Contribution Weight', gridcolor: '#D9D9C2' }
      };

      const scoreDistributionData = useMemo(() => {
        if (leads.length === 0) return [];
        return [{
          x: leads.map(l => l.lead_score),
          type: 'histogram',
          nbinsx: 10,
          marker: {
            color: '#6B8E23',
            line: { color: '#556B2F', width: 1 }
          },
          opacity: 0.85
        }];
      }, [leads]);

      const scoreDistributionLayout = {
        title: { text: 'Lead Score Distribution (0-100)', font: { size: 13, weight: 'bold' } },
        xaxis: { title: 'Lead Score Range', gridcolor: '#F5F5EE' },
        yaxis: { title: 'Prospect Count', gridcolor: '#F5F5EE' },
        margin: { t: 40, r: 15, l: 40, b: 35 }
      };

      const productDistributionData = useMemo(() => {
        if (leads.length === 0) return [];
        const counts = leads.reduce((acc, l) => {
          acc[l.recommended_product] = (acc[l.recommended_product] || 0) + 1;
          return acc;
        }, {});
        
        return [{
          values: Object.values(counts),
          labels: Object.keys(counts),
          type: 'pie',
          hole: 0.4,
          marker: {
            colors: ['#556B2F', '#6B8E23', '#A9A067', '#C08A2E', '#8B4A3B']
          },
          textinfo: 'percent',
          textposition: 'inside'
        }];
      }, [leads]);

      const productDistributionLayout = {
        title: { text: 'Recommended Products Allocation', font: { size: 13, weight: 'bold' } },
        showlegend: true,
        legend: { orientation: 'h', y: -0.2 },
        margin: { t: 40, r: 10, l: 10, b: 50 }
      };

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-[#F5F5EE] flex items-center justify-center p-4">
            <div className="w-full max-w-md bg-white border border-[#D9D9C2] rounded-3xl p-8 shadow-lg transition-all duration-300 hover:shadow-xl">
              <div className="text-center mb-8">
                <div className="w-16 h-16 bg-[#556B2F]/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-[#556B2F]/20">
                  <ShieldCheckIcon className="w-8 h-8 text-[#556B2F]" />
                </div>
                <h1 className="text-2xl font-extrabold text-[#2E2E1F] tracking-tight">IDBI Bank SmartLend</h1>
                <p className="text-sm text-[#6B6B54] mt-2">Right Customer, Right Loan, Right Time</p>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-5">
                <div>
                  <label className="block text-xs font-bold text-[#2E2E1F] uppercase tracking-wider mb-2">Staff Email</label>
                  <input 
                    type="email" 
                    value={loginEmail} 
                    onChange={(e) => setLoginEmail(e.target.value)}
                    className="w-full bg-[#F5F5EE] border border-[#D9D9C2] rounded-xl px-4 py-3 text-sm text-[#2E2E1F] focus:outline-none focus:border-[#556B2F]"
                    required
                  />
                </div>
                <div>
                  <label className="block text-xs font-bold text-[#2E2E1F] uppercase tracking-wider mb-2">Password</label>
                  <input 
                    type="password" 
                    value={loginPassword} 
                    onChange={(e) => setLoginPassword(e.target.value)}
                    className="w-full bg-[#F5F5EE] border border-[#D9D9C2] rounded-xl px-4 py-3 text-sm text-[#2E2E1F] focus:outline-none focus:border-[#556B2F]"
                    required
                  />
                </div>
                
                <div className="text-xs text-[#6B6B54] bg-[#F5F5EE] border border-[#D9D9C2]/60 rounded-xl p-3 flex gap-2">
                  <AlertCircleIcon className="w-4 h-4 text-[#C08A2E] shrink-0" />
                  <span>IDBI Innovate 2026 Hackathon Demo. Access credentials preset.</span>
                </div>
                
                <button 
                  type="submit" 
                  className="w-full bg-[#556B2F] hover:bg-[#3F5220] text-white rounded-xl py-3 font-semibold text-sm transition-colors flex items-center justify-center gap-2"
                >
                  <span>Access Workspace</span>
                  <ArrowRightIcon className="w-4 h-4" />
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F5F5EE] flex text-[#2E2E1F]">
          
          {/* SIDEBAR NAVIGATION */}
          <aside className="w-64 bg-[#556B2F] text-white flex flex-col justify-between shrink-0 border-r border-[#3F5220]">
            <div className="p-6">
              <div className="flex items-center gap-3 mb-8 pb-4 border-b border-[#3F5220]/60">
                <div className="w-9 h-9 bg-white/10 rounded-lg flex items-center justify-center border border-white/20">
                  <ShieldCheckIcon className="w-5 h-5 text-[#A9A067]" />
                </div>
                <div>
                  <h2 className="text-sm font-extrabold tracking-wide uppercase">IDBI SmartLend</h2>
                  <span className="text-[9px] text-white/70 block font-bold tracking-widest uppercase">Innovate 2026</span>
                </div>
              </div>

              <nav className="space-y-1">
                <button 
                  onClick={() => { setActiveTab('dashboard'); setSelectedLeadId(null); }}

                              {chatMessages.filter(m => m.sender !== 'bot' || !m.text.includes("Welcome Sanjay")).map((msg, index) => {
                                const isBot = msg.sender === 'bot';
                                return (
                                  <div key={index} className={`flex gap-1.5 max-w-[90%] ${isBot ? 'self-start' : 'self-end ml-auto flex-row-reverse'}`}>
                                    <div className={`p-2 rounded-xl leading-relaxed text-xs shadow-2xs ${
                                      isBot ? 'bg-[#556B2F] text-white rounded-tl-none' : 'bg-[#F5F5EE] text-[#2E2E1F] border border-[#D9D9C2]/80 rounded-tr-none'
                                    }`}>
                                      {msg.text}
                                    </div>
                                  </div>
                                );
                              })}

                              {chatLoading && (
                                <div className="flex gap-1.5 max-w-[80%] self-start">
                                  <div className="bg-[#556B2F] text-white p-2 rounded-xl rounded-tl-none animate-pulse">
                                    Auditing metrics...
                                  </div>
                                </div>
                              )}
                            </div>

                            <div className="p-2 border-t border-[#D9D9C2] bg-white flex gap-1.5">
                              <input 
                                type="text" 
                                placeholder="Ask about income volatility, visits..." 
                                value={chatInput}
                                onChange={(e) => setChatInput(e.target.value)}
                                onKeyDown={(e) => { if (e.key === 'Enter') { setChatCustomerId(selectedLead.customer_id); handleSendChatMessage(); } }}
                                className="flex-1 bg-[#F5F5EE] border border-[#D9D9C2] rounded-lg px-2.5 py-1.5 text-xs focus:outline-none focus:border-[#556B2F]"
                              />
                              <button 
                                onClick={() => { setChatCustomerId(selectedLead.customer_id); handleSendChatMessage(); }}
                                disabled={chatLoading || !chatInput.trim()}
                                className="bg-[#556B2F] hover:bg-[#3F5220] text-white rounded-lg p-1.5 transition-colors disabled:opacity-50"
                              >
                                <ArrowRightIcon className="w-4 h-4" />
                              </button>
                            </div>

                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* TAB 3: FULL SCREEN CHATBOT */}
                  {activeTab === 'chat' && (
                    <div className="max-w-4xl mx-auto bg-white border border-[#D9D9C2] rounded-2xl shadow-sm flex flex-col h-[580px] overflow-hidden">
                      <div className="bg-[#F5F5EE]/60 border-b border-[#D9D9C2] p-4 flex justify-between items-center">
                        <div>
                          <h3 className="text-sm font-bold text-[#2E2E1F]">Genie Decision Chatbot</h3>
                          <p className="text-[10px] text-[#6B6B54]">Natural-language query grounding interface</p>
                        </div>

                        <div className="flex items-center gap-3">
                          <label className="text-xs font-bold text-[#2E2E1F] uppercase">Active Target:</label>
                          <select 
                            value={chatCustomerId}
                            onChange={(e) => setChatCustomerId(e.target.value)}
                            className="bg-white border border-[#D9D9C2] rounded-xl px-3 py-2 text-xs text-[#2E2E1F] focus:outline-none focus:border-[#556B2F] font-semibold"
                          >
                            {leads.map(l => (
                              <option key={l.customer_id} value={l.customer_id}>
                                {l.name} ({l.customer_id}) • Lead: {l.lead_score.toFixed(0)}
                              </option>
                            ))}
                          </select>
                        </div>
                      </div>

                      <div className="flex-1 p-6 overflow-y-auto space-y-4 bg-[#F5F5EE]/10">
                        {chatMessages.map((msg, index) => {
                          const isBot = msg.sender === 'bot';
                          return (
                            <div key={index} className={`flex gap-3 max-w-[85%] ${isBot ? 'self-start' : 'self-end ml-auto flex-row-reverse'}`}>
                              {isBot && (
                                <div className="w-7 h-7 rounded-full bg-[#556B2F] text-white flex items-center justify-center text-xs font-bold shrink-0 shadow-sm border border-[#3F5220]">
                                  🤖
                                </div>
                              )}
                              <div className="flex flex-col gap-1">
                                <div className={`p-3 rounded-2xl text-xs leading-relaxed shadow-2xs whitespace-pre-line ${
                                  isBot ? 'bg-[#556B2F] text-white rounded-tl-none' : 'bg-white text-[#2E2E1F] border border-[#D9D9C2] rounded-tr-none'
                                }`}>
                                  {msg.text}
                                </div>
                                <span className="text-[8px] text-[#6B6B54] px-1 block">{msg.time}</span>
                              </div>
                            </div>
                          );
                        })}
                        
                        {chatLoading && (
                          <div className="flex gap-3 max-w-[80%] self-start animate-pulse">
                            <div className="w-7 h-7 rounded-full bg-[#556B2F] text-white flex items-center justify-center text-xs font-bold shrink-0">
                              ⚙️
                            </div>
                            <div className="bg-[#556B2F] text-white p-3 rounded-2xl rounded-tl-none text-xs flex items-center gap-2">
                              <span className="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></span>
                              <span className="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:0.2s]"></span>
                              <span className="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:0.4s]"></span>
                            </div>
                          </div>
                        )}
                        <div ref={chatEndRef} />
                      </div>

                      <div className="bg-white border-t border-[#D9D9C2] p-4 flex gap-3">
                        <input 
                          type="text" 
                          placeholder="Ask about this customer's transaction stability, why lead score is warm, etc..." 
                          value={chatInput}
                          onChange={(e) => setChatInput(e.target.value)}
                          onKeyDown={(e) => { if (e.key === 'Enter') handleSendChatMessage(); }}
                          className="flex-1 bg-[#F5F5EE] border border-[#D9D9C2] rounded-xl px-4 py-3 text-xs focus:outline-none focus:border-[#556B2F] text-[#2E2E1F]"
                        />
                        <button 
                          onClick={() => handleSendChatMessage()}
                          disabled={chatLoading || !chatInput.trim()}
                          className="bg-[#556B2F] hover:bg-[#3F5220] text-white rounded-xl px-4 py-3 font-semibold text-xs transition-colors flex items-center gap-1.5"
                        >
                          <span>Send Query</span>
                          <ArrowRightIcon className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  )}

                  {/* TAB 4: MODEL AUDITING */}
                  {activeTab === 'model' && (
                    <div className="space-y-6">
                      
                      {/* Performance metrics */}
                      <div className="bg-white border border-[#D9D9C2] rounded-2xl p-6 shadow-2xs">
                        <div className="flex justify-between items-center border-b border-[#D9D9C2]/40 pb-4 mb-4">
                          <div>
                            <h2 className="text-base font-extrabold text-[#2E2E1F]">XGBoost ML Models Auditing</h2>
                            <p className="text-xs text-[#6B6B54]">Confirm R² and RMSE evaluations for IDBI bank compliance</p>
                          </div>

                          <button 
                            onClick={triggerRetraining}
                            disabled={trainingLoading}
                            className="bg-[#556B2F] hover:bg-[#3F5220] text-white font-semibold text-xs px-4 py-2.5 rounded-xl transition-all shadow-sm flex items-center gap-2"
                          >
                            <RefreshCwIcon className={`w-3.5 h-3.5 ${trainingLoading ? 'animate-spin' : ''}`} />
                            <span>{trainingLoading ? 'Re-fitting XGBoost...' : 'Trigger Live Re-training'}</span>
                          </button>
                        </div>

                        <div className="grid grid-cols-3 gap-5">
                          <div className="bg-[#F5F5EE]/40 border border-[#D9D9C2]/60 rounded-xl p-4">
                            <h4 className="text-xs font-bold text-[#556B2F] uppercase">Intent Regressor</h4>
                            <div className="mt-2 text-2xl font-black text-[#2E2E1F]">
                              R²: {trainingMetrics ? trainingMetrics.intent_r2.toFixed(4) : '0.9945'}
                            </div>
                            <span className="text-[10px] text-[#6B6B54]">RMSE Error: {trainingMetrics ? trainingMetrics.intent_rmse.toFixed(2) : '2.68'} points</span>
                          </div>

                          <div className="bg-[#F5F5EE]/40 border border-[#D9D9C2]/60 rounded-xl p-4">
                            <h4 className="text-xs font-bold text-[#556B2F] uppercase">Income Stability Regressor</h4>
                            <div className="mt-2 text-2xl font-black text-[#2E2E1F]">
                              R²: {trainingMetrics ? trainingMetrics.income_r2.toFixed(4) : '0.9422'}
                            </div>
                            <span className="text-[10px] text-[#6B6B54]">RMSE Error: {trainingMetrics ? trainingMetrics.income_rmse.toFixed(2) : '5.73'} points</span>
                          </div>

                          <div className="bg-[#F5F5EE]/40 border border-[#D9D9C2]/60 rounded-xl p-4">
                            <h4 className="text-xs font-bold text-[#556B2F] uppercase">Repayment Capacity Regressor</h4>
                            <div className="mt-2 text-2xl font-black text-[#2E2E1F]">
                              R²: {trainingMetrics ? trainingMetrics.repayment_r2.toFixed(4) : '0.8891'}
                            </div>
                            <span className="text-[10px] text-[#6B6B54]">RMSE Error: {trainingMetrics ? trainingMetrics.repayment_rmse.toFixed(2) : '3.88'} points</span>
                          </div>
                        </div>
                      </div>

                      {/* GLOBAL DRIVERS */}
                      <div className="bg-white border border-[#D9D9C2] rounded-2xl p-6 shadow-2xs">
                        <h3 className="text-sm font-extrabold text-[#2E2E1F] uppercase tracking-wider mb-4 border-b border-[#D9D9C2]/40 pb-3">Global Feature weights</h3>
                        
                        <div className="grid grid-cols-2 gap-6 text-xs text-[#6B6B54]">
                          <div className="space-y-4">
                            <h4 className="text-xs font-bold text-[#556B2F] uppercase tracking-wide">Intent Score Drivers</h4>
                            <div className="space-y-2">
                              <div className="flex justify-between font-bold"><span>Loan App Visits</span><span>38.2% weight</span></div>
                              <div className="w-full bg-[#F5F5EE] h-2 rounded-full overflow-hidden">
                                <div className="bg-[#C08A2E] h-full" style={{ width: '38%' }}></div>
                              </div>

                              <div className="flex justify-between font-bold"><span>EMI Calculator Uses</span><span>24.5% weight</span></div>
                              <div className="w-full bg-[#F5F5EE] h-2 rounded-full overflow-hidden">
                                <div className="bg-[#C08A2E] h-full" style={{ width: '24%' }}></div>
                              </div>

                              <div className="flex justify-between font-bold"><span>Stated Loan Type Interest</span><span>20.1% weight</span></div>
                              <div className="w-full bg-[#F5F5EE] h-2 rounded-full overflow-hidden">
                                <div className="bg-[#C08A2E] h-full" style={{ width: '20%' }}></div>
                              </div>
                            </div>
                          </div>

                          <div className="space-y-4">
                            <h4 className="text-xs font-bold text-[#556B2F] uppercase tracking-wide">Repayment Score Drivers</h4>
                            <div className="space-y-2">
                              <div className="flex justify-between font-bold"><span>CIBIL Credit Score</span><span>42.1% weight</span></div>
                              <div className="w-full bg-[#F5F5EE] h-2 rounded-full overflow-hidden">
                                <div className="bg-[#6B8E23] h-full" style={{ width: '42%' }}></div>
                              </div>

                              <div className="flex justify-between font-bold"><span>Existing EMIs</span><span>31.4% weight</span></div>
                              <div className="w-full bg-[#F5F5EE] h-2 rounded-full overflow-hidden">
                                <div className="bg-[#6B8E23] h-full" style={{ width: '31%' }}></div>
                              </div>

                              <div className="flex justify-between font-bold"><span>Monthly Expenses (Debits)</span><span>14.8% weight</span></div>
                              <div className="w-full bg-[#F5F5EE] h-2 rounded-full overflow-hidden">
                                <div className="bg-[#6B8E23] h-full" style={{ width: '14%' }}></div>
                              </div>
                            </div>
                          </div>
                        </div>

                        <div className="mt-8 text-center text-xs text-[#6B6B54] bg-[#F5F5EE]/40 p-4 border border-dashed border-[#D9D9C2] rounded-2xl">
                          💡 <strong>IDBI Innovate 2026 Model Verification:</strong> Running models are verified against simulated bureau profiles. Re-training fits the XGBoost parameters on-the-fly and syncs live.
                        </div>
                      </div>

                    </div>
                  )}

                </>
              )}
            </div>
          </main>
        </div>
      );
    }

    // Mount React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
